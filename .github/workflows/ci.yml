name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      # mise symlinks to the runner's pre-installed rust toolchain instead of
      # installing fresh, so mise.toml's `components = "rustfmt,clippy"` is
      # silently ignored. Add them via rustup to guarantee hk can call
      # rustfmt / clippy.
      - name: Install rustfmt + clippy components
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: hk check
        run: hk check --all
      - name: cargo test
        run: cargo test --locked
