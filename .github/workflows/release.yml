name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          # zizmor: cache-poisoning — release job publishes artifacts, so never restore cached deps.
          cache: false
      - name: Smoke test
        run: |
          go build -trimpath -ldflags="-s -w" -o /tmp/aws-gcp-token .
          out=$(/tmp/aws-gcp-token || true)
          echo "$out" | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['success'] is False and d['code']=='MISSING_AUDIENCE', d"
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ startsWith(github.ref, 'refs/tags/v') && 'release --clean' || 'release --snapshot --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        with:
          name: dist
          path: dist
